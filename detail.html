<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Souvenir | Grizelle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --ivory: #f8f5f0;
      --ink: #292522;
      --cocoa: #5a3820;
      --gold: #bc8a4c;
      --sand: #e9e1d5;
      --line: rgba(41, 37, 34, .12)
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      background: var(--ivory);
      color: var(--ink);
      font-family: Inter, Arial, sans-serif
    }

    .wrap {
      width: min(1120px, calc(100% - 40px));
      margin: auto
    }

    .head {
      border-bottom: 1px solid var(--line);
      background: rgba(248, 245, 240, .95)
    }

    .nav {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .brand {
      font: 700 34px/1 'Cormorant Garamond', serif;
      color: var(--ink);
      text-decoration: none
    }

    .brand b {
      color: var(--gold)
    }

    .back {
      font-size: 12px;
      color: var(--cocoa);
      text-decoration: none
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 66px;
      padding: 64px 0 84px
    }

    .image-main {
      position: relative;
      aspect-ratio: 1/1.16;
      background: var(--sand);
      overflow: hidden
    }

    .image-main img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .image-main model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent
    }

    .ar-poster {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sand);
      color: var(--cocoa);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-align: center;
      padding: 0 24px
    }

    .ar-cta {
      position: absolute;
      left: 16px;
      bottom: 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border: 1.5px solid var(--gold);
      border-radius: 999px;
      background: rgba(248, 245, 240, .9);
      color: var(--cocoa);
      font: 600 11px/1 Inter, Arial, sans-serif;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer
    }

    .ar-cta:hover {
      background: var(--gold);
      color: #fff
    }

    .eyebrow {
      margin: 0 0 13px;
      color: var(--cocoa);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase
    }

    h1 {
      margin: 0;
      font: 600 clamp(41px, 5vw, 62px)/.92 'Cormorant Garamond', serif;
      letter-spacing: -.04em
    }

    .desc {
      margin: 20px 0 0;
      color: rgba(41, 37, 34, .62);
      font-size: 14px;
      line-height: 1.75
    }

    .section {
      margin-top: 32px
    }

    .section-title {
      margin: 0 0 10px;
      color: rgba(41, 37, 34, .55);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase
    }

    .option-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px
    }

    .option-pill {
      padding: 9px 20px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--ink);
      font: 500 12px/1 Inter, Arial, sans-serif;
      letter-spacing: .03em;
      cursor: pointer;
      transition: .2s
    }

    .option-pill:hover {
      border-color: var(--gold)
    }

    .option-pill.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff
    }

    .spec {
      border-top: 1px solid var(--line)
    }

    .spec div {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px
    }

    .spec span:first-child {
      color: rgba(41, 37, 34, .55)
    }

    .spec span:last-child {
      text-align: right
    }

    .tiers {
      border-top: 1px solid var(--line)
    }

    .tier {
      padding: 15px 0;
      border-bottom: 1px solid var(--line)
    }

    .tier-name {
      margin: 0 0 11px;
      color: var(--cocoa);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase
    }

    .tier-prices {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px
    }

    .tier-prices span {
      font-size: 10px;
      color: rgba(41, 37, 34, .52)
    }

    .tier-prices strong {
      display: block;
      margin-top: 4px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 500
    }

    .notice {
      padding: 20px;
      background: #f0e9df;
      color: #655a52;
      font-size: 13px;
      line-height: 1.65
    }

    .button {
      display: flex;
      justify-content: center;
      margin-top: 30px;
      padding: 15px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase
    }

    .button:hover {
      background: var(--cocoa)
    }

    .variants {
      grid-column: 1/-1;
      margin-top: 4px;
      padding-top: 35px;
      border-top: 1px solid var(--line)
    }

    .variants h2 {
      margin: 0 0 20px;
      font: 600 39px/1 'Cormorant Garamond', serif
    }

    .variant-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px
    }

    .variant-grid img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--sand)
    }

    @media(max-width:760px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 33px;
        padding-top: 35px
      }

      .tier-prices {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px
      }

      .variant-grid {
        grid-template-columns: repeat(2, 1fr)
      }

      .wrap {
        width: min(100% - 32px, 1120px)
      }
    }
  </style>
</head>

<body>
  <header class="head">
    <nav class="wrap nav"><a class="brand" href="index.html">Grizelle<b>.</b></a><a class="back"
        href="index.html#pricelist">← Kembali ke pricelist</a></nav>
  </header>
  <main class="wrap layout">
    <div class="image-main" id="imageMain"><img id="mainImage" alt="Produk Grizelle"></div>
    <section>
      <p id="category" class="eyebrow"></p>
      <h1 id="name"></h1>
      <p id="description" class="desc"></p>
      <div class="section" id="optionsSection" hidden>
        <p class="section-title">Pilih varian</p>
        <div id="optionList" class="option-list"></div>
      </div>
      <div class="section">
        <p class="section-title">Detail produk</p>
        <div id="spec" class="spec"></div>
      </div>
      <div class="section">
        <p class="section-title">Harga per pcs berdasarkan jumlah</p>
        <div id="tiers" class="tiers"></div>
      </div><a id="wa" class="button" target="_blank" rel="noopener">Pesan via WhatsApp ↗</a>
    </section>
    <section id="variants" class="variants" hidden>
      <p class="eyebrow">Pilihan desain</p>
      <h2>Foto Varian Produk</h2>
      <div id="variantGrid" class="variant-grid"></div>
    </section>
  </main>
  <script>
    const q = new URLSearchParams(location.search).get('item');
    const items = {};
    const standardTiers = [['Kemasan Standar', ['5.000', '4.500', '4.250', '4.000']]];
    const codedProducts = [
      ['A001', 'Pouch', 'Pouch Serut Kanvas Polos', 'asset/catalog/A001.png', 'https://grizelle-3d.lunarcreativa.workers.dev/A001.glb', 'https://grizelle-3d.lunarcreativa.workers.dev/A001.usdz'],
      ['A002', 'Pouch', 'Pouch Kulit Bronze Wristlet', 'asset/catalog/A002.png', 'https://grizelle-3d.lunarcreativa.workers.dev/A002.glb', 'https://grizelle-3d.lunarcreativa.workers.dev/A002.usdz'],
      ['A003', 'Pouch', 'Pouch Kanvas Motif Aztec', 'asset/catalog/A003.png', 'https://grizelle-3d.lunarcreativa.workers.dev/A003.glb', 'https://grizelle-3d.lunarcreativa.workers.dev/A003.usdz'],
      ['B001', 'Botol Kaca', 'Botol Kaca Frosted Tutup Stainless', 'asset/catalog/B001.png', 'https://grizelle-3d.lunarcreativa.workers.dev/B001.glb', 'https://grizelle-3d.lunarcreativa.workers.dev/B001.usdz'],
      ['B002', 'Botol Kaca', 'Tumbler Kaca Sleeve Kulit', 'asset/catalog/B002.png', 'https://grizelle-3d.lunarcreativa.workers.dev/B002.glb', 'https://grizelle-3d.lunarcreativa.workers.dev/B002.usdz'],
      ['E001', 'Gelas Alumunium', 'Gelas Enamel Klasik', 'asset/catalog/E001.png', 'https://grizelle-3d.lunarcreativa.workers.dev/E001.glb', 'https://grizelle-3d.lunarcreativa.workers.dev/E001.usdz'],
      ['F001', 'Tas', 'Tas Kanvas Tote Motif Tropical', 'asset/catalog/F001.png', 'https://grizelle-3d.lunarcreativa.workers.dev/F001.glb', 'https://grizelle-3d.lunarcreativa.workers.dev/F001.usdz'],
      ['G001', 'Piring', 'Piring Keramik Motif Biru Putih', 'asset/catalog/G001.png', 'https://grizelle-3d.lunarcreativa.workers.dev/G001.glb', 'https://grizelle-3d.lunarcreativa.workers.dev/G001.usdz'],
      ['I001', 'Dispenser Sabun', 'Dispenser Sabun Custom', 'asset/catalog/I001.png', 'https://grizelle-3d.lunarcreativa.workers.dev/I001.glb', 'https://grizelle-3d.lunarcreativa.workers.dev/I001.usdz']
    ];
    codedProducts.forEach(([code, cat, name, img, modelGlb, modelUsdz]) => { items[code] = { cat, name, img, modelGlb, modelUsdz, description: `${name} dari koleksi souvenir Grizelle. Hubungi kami untuk spesifikasi, kustomisasi warna/label, dan harga berdasarkan jumlah pesanan.`, spec: [['Kode produk', code], ['Kategori', cat], ['Model 3D', modelGlb ? 'Tersedia' : 'Belum tersedia'], ['Minimum order', 'Hubungi kami']], tiers: standardTiers } });

    // ====== OPSI VARIAN (opsional per produk) ======
    // Tambahkan entri di sini untuk kode produk yang punya pilihan warna/model.
    // Setiap opsi boleh punya "img" sendiri (foto) dan/atau "modelGlb"/"modelUsdz" sendiri (3D),
    // serta "tiers" sendiri jika harganya beda. Kalau tidak diisi, akan memakai punya produk utama.
const productOptions = {
  'B001': [
    { 
      label: 'Produk', 
      img: 'asset/catalog/B001.png', 
      modelGlb: 'https://grizelle-3d.lunarcreativa.workers.dev/B001.glb',
      modelUsdz: 'https://grizelle-3d.lunarcreativa.workers.dev/B001.usdz',
      tiers: [['Kemasan Standar', ['5.000', '4.500', '4.250', '4.000']]] 
    },
    { label: 'Hard Box 1', img: 'asset/catalog/H002.png', tiers: [['Kemasan Standar', ['5.200', '4.700', '4.450', '4.200']]] },
    ],
  'B002': [
    { 
      label: 'Produk', 
      img: 'asset/catalog/B002.png', 
      modelGlb: 'https://grizelle-3d.lunarcreativa.workers.dev/B002.glb',
      modelUsdz: 'https://grizelle-3d.lunarcreativa.workers.dev/B002.usdz',
      tiers: [['Kemasan Standar', ['5.000', '4.500', '4.250', '4.000']]] 
    },
    { label: 'Hard Box', img: 'asset/catalog/H006.png', tiers: [['Kemasan Standar', ['5.200', '4.700', '4.450', '4.200']]] },
  ],
  'E001': [
    { 
      label: 'Produk', 
      img: 'asset/catalog/B002.png', 
      modelGlb: 'https://grizelle-3d.lunarcreativa.workers.dev/E001.glb',
      modelUsdz: 'https://grizelle-3d.lunarcreativa.workers.dev/E001.usdz',
      tiers: [['Kemasan Standar', ['5.000', '4.500', '4.250', '4.000']]] 
    },
    { label: 'Hard Box 1', img: 'asset/catalog/H001.png', tiers: [['Kemasan Standar', ['5.200', '4.700', '4.450', '4.200']]] },
    { label: 'Hard Box 2', img: 'asset/catalog/H007.png', tiers: [['Kemasan Standar', ['5.200', '4.700', '4.450', '4.200']]] },

  ],
  'G001': [
    { 
      label: 'Produk', 
      img: 'asset/catalog/G001.png', 
      modelGlb: 'https://grizelle-3d.lunarcreativa.workers.dev/G001.glb',
      modelUsdz: 'https://grizelle-3d.lunarcreativa.workers.dev/G001.usdz',
      tiers: [['Kemasan Standar', ['5.000', '4.500', '4.250', '4.000']]] 
    },
    { label: 'Hard Box 1', img: 'asset/catalog/H005.png', tiers: [['Kemasan Standar', ['5.200', '4.700', '4.450', '4.200']]] },
    { label: 'Hard Box 2', img: 'asset/catalog/H003.png', tiers: [['Kemasan Standar', ['5.200', '4.700', '4.450', '4.200']]] },

  ],
  'I001': [
    { 
      label: 'Produk', 
      img: 'asset/catalog/I001.png', 
      modelGlb: 'https://grizelle-3d.lunarcreativa.workers.dev/I001.glb',
      modelUsdz: 'https://grizelle-3d.lunarcreativa.workers.dev/I001.usdz',
      tiers: [['Kemasan Standar', ['5.000', '4.500', '4.250', '4.000']]] 
    },
    { label: 'Hard Box 1', img: 'asset/catalog/H002.png', tiers: [['Kemasan Standar', ['5.200', '4.700', '4.450', '4.200']]] },
    { label: 'Hard Box 2', img: 'asset/catalog/H004.png', tiers: [['Kemasan Standar', ['5.200', '4.700', '4.450', '4.200']]] },

  ]
};

    const fallback = { cat: 'Koleksi Grizelle', name: 'Produk tidak ditemukan', img: 'https://grizelle-3d.lunarcreativa.workers.dev/A001.glb', description: 'Produk yang diminta tidak ditemukan. Silakan kembali ke katalog untuk memilih produk.', spec: [['Status', 'Kode produk tidak terdaftar']], tiers: [] };
    const p = items[q] || fallback;
    document.getElementById('name').textContent = p.name;

    function renderTiers(tiersData) {
      return (tiersData && tiersData.length) ? tiersData.map(t => `<div class="tier"><p class="tier-name">${t[0]}</p><div class="tier-prices">${['100 pcs', '300 pcs', '500 pcs', '1.000 pcs'].map((n, i) => `<div><span>${n}</span><strong>Rp ${t[1][i]}</strong></div>`).join('')}</div></div>`).join('') : '<div class="notice">Harga per pcs untuk koleksi ini sedang diperbarui. Hubungi kami untuk informasi tercepat.</div>';
    }

    function renderMedia(modelGlb, modelUsdz, imgSrc, alt) {
      if (modelGlb) {
        imageMain.innerHTML = `<model-viewer id="arViewer" src="${modelGlb}" ios-src="${modelUsdz || ''}" alt="${alt}" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1"><div slot="poster" class="ar-poster" id="arPosterMsg">Menyiapkan pratinjau 3D…</div><button slot="ar-button" class="ar-cta" id="arBtn" style="display:none">Lihat dalam AR ↗</button></model-viewer>`;
        const mv = document.getElementById('arViewer'), btn = document.getElementById('arBtn');
        mv.addEventListener('load', () => { btn.style.display = 'inline-flex' });
        mv.addEventListener('error', () => renderImage(imgSrc, alt));
        setTimeout(() => { if (!mv.loaded) renderImage(imgSrc, alt) }, 9000);
      } else {
        renderImage(imgSrc, alt);
      }
    }
    function renderImage(imgSrc, alt) {
      imageMain.innerHTML = `<img id="mainImage" alt="${alt}">`;
      mainImage.src = imgSrc;
      mainImage.alt = alt;
    }

    renderMedia(p.modelGlb, p.modelUsdz, p.img, p.name);
    category.textContent = p.cat; name.textContent = p.name; description.textContent = p.description; spec.innerHTML = p.spec.map(x => `<div><span>${x[0]}</span><span>${x[1]}</span></div>`).join('');
    tiers.innerHTML = renderTiers(p.tiers);
    wa.href = 'https://wa.me/6281215893627?text=' + encodeURIComponent('Halo Grizelle, saya ingin bertanya tentang ' + p.name + '.');
    if (p.variants) { variants.hidden = false; variantGrid.innerHTML = p.variants.map(src => `<img src="${src}" alt="Varian ${p.name}">`).join('') }

    // ====== Render tombol opsi & mekanisme ganti gambar/harga ======
    const opts = productOptions[q];
    if (opts && opts.length) {
      optionsSection.hidden = false;
      let waBaseText = 'Halo Grizelle, saya ingin bertanya tentang ' + p.name;
      const applyOption = (idx) => {
        const opt = opts[idx];
        renderMedia(opt.modelGlb || null, opt.modelUsdz || null, opt.img || p.img, p.name + ' - ' + opt.label);
        tiers.innerHTML = renderTiers(opt.tiers || p.tiers);
        [...optionList.children].forEach((el, i) => el.classList.toggle('active', i === idx));
        wa.href = 'https://wa.me/6281215893627?text=' + encodeURIComponent(waBaseText + ' (varian ' + opt.label + ').');
      };
      optionList.innerHTML = opts.map((o, i) => `<button type="button" class="option-pill${i === 0 ? ' active' : ''}" data-i="${i}">${o.label}</button>`).join('');
      [...optionList.children].forEach((btn, i) => btn.addEventListener('click', () => applyOption(i)));
    }
  </script>
</body>

</html>
