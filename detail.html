<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Detail Souvenir | Grizelle</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script><style>:root{--ivory:#f8f5f0;--ink:#292522;--cocoa:#5a3820;--gold:#bc8a4c;--sand:#e9e1d5;--line:rgba(41,37,34,.12)}*{box-sizing:border-box}body{margin:0;background:var(--ivory);color:var(--ink);font-family:Inter,Arial,sans-serif}.wrap{width:min(1120px,calc(100% - 40px));margin:auto}.head{border-bottom:1px solid var(--line);background:rgba(248,245,240,.95)}.nav{height:70px;display:flex;align-items:center;justify-content:space-between}.brand{font:700 34px/1 'Cormorant Garamond',serif;color:var(--ink);text-decoration:none}.brand b{color:var(--gold)}.back{font-size:12px;color:var(--cocoa);text-decoration:none}.layout{display:grid;grid-template-columns:1fr 1fr;gap:66px;padding:64px 0 84px}.image-main{position:relative;aspect-ratio:1/1.16;background:var(--sand);overflow:hidden}.image-main img{width:100%;height:100%;object-fit:cover}.image-main model-viewer{width:100%;height:100%;--poster-color:transparent}.ar-poster{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--sand);color:var(--cocoa);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;text-align:center;padding:0 24px}.ar-cta{position:absolute;left:16px;bottom:16px;display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:1.5px solid var(--gold);border-radius:999px;background:rgba(248,245,240,.9);color:var(--cocoa);font:600 11px/1 Inter,Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}.ar-cta:hover{background:var(--gold);color:#fff}.eyebrow{margin:0 0 13px;color:var(--cocoa);font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase}h1{margin:0;font:600 clamp(41px,5vw,62px)/.92 'Cormorant Garamond',serif;letter-spacing:-.04em}.desc{margin:20px 0 0;color:rgba(41,37,34,.62);font-size:14px;line-height:1.75}.section{margin-top:32px}.section-title{margin:0 0 10px;color:rgba(41,37,34,.55);font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase}.spec{border-top:1px solid var(--line)}.spec div{display:flex;justify-content:space-between;gap:20px;padding:12px 0;border-bottom:1px solid var(--line);font-size:13px}.spec span:first-child{color:rgba(41,37,34,.55)}.spec span:last-child{text-align:right}.tiers{border-top:1px solid var(--line)}.tier{padding:15px 0;border-bottom:1px solid var(--line)}.tier-name{margin:0 0 11px;color:var(--cocoa);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}.tier-prices{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.tier-prices span{font-size:10px;color:rgba(41,37,34,.52)}.tier-prices strong{display:block;margin-top:4px;color:var(--ink);font-size:13px;font-weight:500}.notice{padding:20px;background:#f0e9df;color:#655a52;font-size:13px;line-height:1.65}.button{display:flex;justify-content:center;margin-top:30px;padding:15px;background:var(--ink);color:#fff;text-decoration:none;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}.button:hover{background:var(--cocoa)}.variants{grid-column:1/-1;margin-top:4px;padding-top:35px;border-top:1px solid var(--line)}.variants h2{margin:0 0 20px;font:600 39px/1 'Cormorant Garamond',serif}.variant-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.variant-grid img{display:block;width:100%;aspect-ratio:1;object-fit:cover;background:var(--sand)}@media(max-width:760px){.layout{grid-template-columns:1fr;gap:33px;padding-top:35px}.tier-prices{grid-template-columns:repeat(2,1fr);gap:12px}.variant-grid{grid-template-columns:repeat(2,1fr)}.wrap{width:min(100% - 32px,1120px)}}</style></head><body><header class="head"><nav class="wrap nav"><a class="brand" href="index.html">Grizelle<b>.</b></a><a class="back" href="index.html#pricelist">← Kembali ke pricelist</a></nav></header><main class="wrap layout"><div class="image-main" id="imageMain"><img id="mainImage" alt="Produk Grizelle"></div><section><p id="category" class="eyebrow"></p><h1 id="name"></h1><p id="description" class="desc"></p><div class="section"><p class="section-title">Detail produk</p><div id="spec" class="spec"></div></div><div class="section"><p class="section-title">Harga per pcs berdasarkan jumlah</p><div id="tiers" class="tiers"></div></div><a id="wa" class="button" target="_blank" rel="noopener">Pesan via WhatsApp ↗</a></section><section id="variants" class="variants" hidden><p class="eyebrow">Pilihan desain</p><h2>Foto Varian Produk</h2><div id="variantGrid" class="variant-grid"></div></section></main><script>
const q=new URLSearchParams(location.search).get('item')||'kipas';
const standardTiers=[['Kemasan Standar',['5.000','4.500','4.250','4.000']]];
const basic=(cat,name,img,description=`Pilihan ${name} dari koleksi Grizelle. Hubungi tim kami untuk foto detail, pilihan kustom, dan harga berdasarkan jumlah pesanan.`,info='Produk dapat dikustom sesuai kebutuhan acara',minOrder='Minimum 100 pcs')=>({cat,name,img,description,info,minOrder,spec:[['Informasi',info],['Minimum order',minOrder]],tiers:standardTiers});
const items={
  'cardholder':basic('Aksesori meja','Cardholder & Tempat Tisu','asset/CARDHOLDER%20%26%20TEMPAT%20TISU.png'),
  'kipas':basic('Aksesori pernikahan','Cermin & Kipas','asset/Cermin%20%26%20Kipas.png'),
  'clutch':basic('Aksesori','Clutch','asset/Clutch.png'),
  'crystal-jar':basic('Home living','Crystal Jar','asset/Crystal%20Jar.png'),
  'ekonomis':basic('Koleksi ekonomis','Ekonomis 5 Ribuan','asset/Ekonomis%205%20Ribuan.png'),
  'gelas':basic('Tableware','Gelas & Cangkir','asset/Gelas%20%26%20Cangkir.png'),
  'handbag':basic('Aksesori','Handbag','asset/Handbag.png'),
  'handsoap':{cat:'Personal care',name:'Handsoap Custom',img:'asset/Handsoap.png',description:'Sabun cuci tangan cair dengan label custom, sablon, dan thank you card.',spec:[['Ukuran','Botol custom'],['Material','Botol plastik · sabun cair'],['Minimum order','100 pcs']],variants:['asset/Hand%20Soap/Hand%20Soap%20Glass%20Crystal.png','asset/Hand%20Soap/Hand%20Soap%20Marble%20Doﬀ.png','asset/Hand%20Soap/Hand%20Soap%20Pump.png'],tiers:[['Plastik Kemas (Standar)',['12.300','11.500','11.300','10.600']],['Kemas Mika + Pita',['16.800','16.000','15.800','15.000']],['Box Custom 1 Warna',['13.800','13.000','12.800','12.100']],['Box Custom Full Color',['16.300','15.500','15.200','14.500']]]},
  'handuk':basic('Textile','Handuk','asset/Handuk.jpeg'),
  'merchandise':basic('Custom goods','Kaos, Merchandise, Seminar Kit','asset/KAOS%2C%20Merchandise%2C%20SEMINAR%20KIT.png'),
  'keramik':{cat:'Tableware',name:'Keramik Motif Mandarin',img:'asset/Keramik.jpeg',description:'Pilihan piring keramik bermotif Mandarin dengan kemasan dan thank you card.',spec:[['Material','Keramik motif Mandarin'],['Kemasan','Plastik / box custom'],['Minimum order','100 pcs']],variants:['asset/kramik/Mangkok%20Motif%20Mandarin.png','asset/kramik/Piring%20Motif%20Mandarin.png'],tiers:[['Plastik (Standar)',['22.000','20.000','18.900','17.500']],['Kemas Box 1 Warna',['23.200','21.100','20.400','19.000']],['Kemas Box Full Color',['24.200','22.100','21.400','20.000']]]},
  'pouch':{cat:'Textile',name:'Pouch Kanvas Tropical',img:'asset/Pouch.png',modelGlb:'https://grizelle-3d.lunarcreativa.workers.dev/Meshy_AI_Wedding_Pouch_3D_0720030142_image-to-3d-texture-compressed.glb',modelUsdz:'https://grizelle-3d.lunarcreativa.workers.dev/Meshy_AI_Wedding_Pouch_3D_0720030142_image-to-3d-texture-compressed.usdz',description:'Pouch kanvas dengan ritsleting, label katun, kemasan, dan thank you card.',spec:[['Ukuran potong','20 × 30 cm'],['Ukuran jadi','18 × 13 × 3 cm'],['Material','Kanvas · ritsleting · label katun'],['Minimum order','100 pcs']],tiers:[['Plastik Kemas (Standar)',['5.500','5.000','4.800','4.500']],['Kemas Box Ivory',['7.000','6.700','6.500','6.000']],['Kemas Mika + Pita',['9.400','9.200','9.000','8.500']]]},
  'sajadah':basic('Religious gift','Sajadah, Buku Yasin','asset/Sajadah%2C%20Buku%20Yasin.png'),
  'alat-makan':basic('Tableware','Sendok, Telenan, Centong','asset/sendok%2C%20telenan%2C%20centong.png'),
  'signature':basic('Koleksi premium','Signature','asset/Signature.png'),
  'siraman':basic('Ritual pernikahan','Souvenir Siraman','asset/Souvenir%20Siraman.png'),
  'umroh':basic('Religious gift','Souvenir Umroh','asset/Souvenir%20Umroh.jpeg'),
  'totebag':{cat:'Textile',name:'Totebag Spunbond',img:'asset/tote%20bag.png',description:'Totebag spunbond warna-warni dengan sablon custom dan thank you card.',spec:[['Ukuran potong','30 × 80 cm'],['Ukuran jadi','35 × 25 cm'],['Material','Spunbond · sablon'],['Minimum order','25 pcs']],variants:['asset/Totebag/Gemini_Generated_Image_h814dvh814dvh814-e1768312957893.png','asset/Totebag/Totebag%20Blacu%20Kantong.png','asset/Totebag/Totebag%20Blacu%20Kanvas%20Lipat.png','asset/Totebag/Totebag%20Blacu%20Lipat%20Santiago.png'],tiers:[['Kemas Standar',['7.500','6.800','6.600','5.700']],['Kemas Box Ivory',['11.400','10.300','9.800','8.500']],['Kemas Mika + Pita',['11.000','10.600','10.300','9.200']]]},
  'tumbler-kaca':basic('Drinkware','Tumbler Kaca','asset/Tumbler%20Kaca.png'),
  'tumbler-stainless':basic('Drinkware','Tumbler Stainless','asset/Tumbler%20Stainless.png'),
  'wewangian':basic('Home fragrance','Wewangian','asset/Wewangian.png')
};
const fallback=basic('Koleksi Grizelle','Produk tidak ditemukan','asset/Signature.png','Produk yang diminta tidak ditemukan. Silakan kembali ke pricelist untuk memilih produk.');
const p=items[q]||fallback;
document.getElementById('name').textContent=p.name;
if(p.modelGlb){imageMain.innerHTML=`<model-viewer id="arViewer" src="${p.modelGlb}" ios-src="${p.modelUsdz}" alt="${p.name}" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1"><div slot="poster" class="ar-poster" id="arPosterMsg">Menyiapkan pratinjau 3D…</div><button slot="ar-button" class="ar-cta" id="arBtn" style="display:none">Lihat dalam AR ↗</button></model-viewer>`;
const mv=document.getElementById('arViewer'),msg=document.getElementById('arPosterMsg'),btn=document.getElementById('arBtn');
mv.addEventListener('load',()=>{btn.style.display='inline-flex'});
mv.addEventListener('error',e=>{msg.textContent='Gagal memuat model 3D: '+((e.detail&&e.detail.type)||'unknown error')+'. Periksa URL/CORS bucket R2.'});
setTimeout(()=>{if(!mv.loaded)msg.textContent='Model 3D belum termuat setelah 9 detik. Kemungkinan CORS belum aktif atau URL salah — cek tab Network di browser (F12) untuk kode status file .glb.'},9000);
}else{imageMain.innerHTML=`<img id="mainImage" alt="${p.name}">`;mainImage.src=p.img;mainImage.alt=p.name}
category.textContent=p.cat;name.textContent=p.name;description.textContent=p.description;spec.innerHTML=p.spec.map(x=>`<div><span>${x[0]}</span><span>${x[1]}</span></div>`).join('');tiers.innerHTML=p.tiers.length?p.tiers.map(t=>`<div class="tier"><p class="tier-name">${t[0]}</p><div class="tier-prices">${['100 pcs','300 pcs','500 pcs','1.000 pcs'].map((n,i)=>`<div><span>${n}</span><strong>Rp ${t[1][i]}</strong></div>`).join('')}</div></div>`).join(''):'<div class="notice">Harga per pcs untuk koleksi ini sedang diperbarui. Hubungi kami untuk informasi tercepat.</div>';wa.href='https://wa.me/62895377696312?text='+encodeURIComponent('Halo Grizelle, saya ingin bertanya tentang '+p.name+'.');if(p.variants){variants.hidden=false;variantGrid.innerHTML=p.variants.map(src=>`<img src="${src}" alt="Varian ${p.name}">`).join('')}
</script></body></html>
